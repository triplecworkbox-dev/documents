// ── DRAW ──
function worldToScreen(x, y) {
  return {
    x: pan.x + x * zoom,
    y: pan.y + y * zoom
  };
}

function screenToWorld(x, y) {
  return {
    x: (x - pan.x) / zoom,
    y: (y - pan.y) / zoom
  };
}

function drawEdge(edge) {
  const a = nodeMap[edge.from];
  const b = nodeMap[edge.to];
  if (!a || !b) return;

  const sa = worldToScreen(a.x, a.y);
  const sb = worldToScreen(b.x, b.y);

  ctx.beginPath();

  if (edge.style === 'main') {
    ctx.lineWidth = 2.5 * zoom;
    ctx.strokeStyle = edge.color;
    ctx.setLineDash([]);
    ctx.globalAlpha = 0.6;
  } else if (edge.style === 'branch') {
    ctx.lineWidth = 1.8 * zoom;
    ctx.strokeStyle = edge.color;
    ctx.setLineDash([]);
    ctx.globalAlpha = 0.45;
  } else if (edge.style === 'leaf') {
    ctx.lineWidth = 1.2 * zoom;
    ctx.strokeStyle = edge.color;
    ctx.setLineDash([4 * zoom, 4 * zoom]);
    ctx.globalAlpha = 0.35;
  } else if (edge.style === 'converge') {
    ctx.lineWidth = 2 * zoom;
    ctx.strokeStyle = edge.color;
    ctx.setLineDash([]);
    ctx.globalAlpha = 0.5;
  } else if (edge.style === 'hmw') {
    ctx.lineWidth = 1 * zoom;
    ctx.strokeStyle = edge.color;
    ctx.setLineDash([3 * zoom, 6 * zoom]);
    ctx.globalAlpha = 0.7;
  } else if (edge.style === 'insight') {
    ctx.lineWidth = 1.5 * zoom;
    ctx.strokeStyle = edge.color;
    ctx.setLineDash([2 * zoom, 8 * zoom]);
    ctx.globalAlpha = 0.8;
  }

  // Curved edge
  const mx = (sa.x + sb.x) / 2;
  const my = (sa.y + sb.y) / 2;
  const dx = sb.x - sa.x;
  const dy = sb.y - sa.y;
  const curve = (edge.style === 'insight' || edge.style === 'hmw') ? 0.25 : 0.12;
  const cx = mx - dy * curve;
  const cy = my + dx * curve;

  ctx.moveTo(sa.x, sa.y);
  ctx.quadraticCurveTo(cx, cy, sb.x, sb.y);
  ctx.stroke();

  ctx.setLineDash([]);
  ctx.globalAlpha = 1;
}

function drawNode(node, t) {
  const s = worldToScreen(node.x, node.y);
  const r = node.r * zoom;
  const isHovered = hoveredNode === node.id;

  ctx.save();

  // Pulse for centre node
  if (node.type === 'centre') {
    const pulse = 1 + Math.sin(t * 0.04) * 0.04;
    ctx.scale(1, 1); // handled by radius below
    const pr = r * pulse;

    // Outer glow rings
    for (let i = 3; i >= 1; i--) {
      ctx.beginPath();
      ctx.arc(s.x, s.y, pr + i * 12 * zoom, 0, Math.PI * 2);
      ctx.strokeStyle = '#ffe66d';
      ctx.lineWidth = 1;
      ctx.globalAlpha = 0.06 / i;
      ctx.stroke();
    }
    ctx.globalAlpha = 1;

    // Fill
    const grad = ctx.createRadialGradient(s.x - r * 0.3, s.y - r * 0.3, 0, s.x, s.y, pr);
    grad.addColorStop(0, '#fff5a0');
    grad.addColorStop(1, '#ffe66d');
    ctx.beginPath();
    ctx.arc(s.x, s.y, pr, 0, Math.PI * 2);
    ctx.fillStyle = grad;
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.5)';
    ctx.lineWidth = 2 * zoom;
    ctx.stroke();
  } else {
    // Hover effect
    const scale = isHovered ? 1.08 : 1;
    const cr = r * scale;

    if (node.type === 'hmw') {
      // Ghost node
      ctx.beginPath();
      ctx.arc(s.x, s.y, cr, 0, Math.PI * 2);
      ctx.fillStyle = node.color;
      ctx.fill();
      ctx.strokeStyle = node.border || 'rgba(255,255,255,0.2)';
      ctx.lineWidth = (isHovered ? 2 : 1.5) * zoom;
      ctx.setLineDash([4 * zoom, 3 * zoom]);
      ctx.stroke();
      ctx.setLineDash([]);
    } else {
      // Shadow
      ctx.shadowColor = node.color;
      ctx.shadowBlur = isHovered ? 24 : 10;

      ctx.beginPath();
      ctx.arc(s.x, s.y, cr, 0, Math.PI * 2);

      const grad = ctx.createRadialGradient(s.x - cr * 0.35, s.y - cr * 0.35, cr * 0.1, s.x, s.y, cr);
      grad.addColorStop(0, lighten(node.color, 40));
      grad.addColorStop(1, node.color);
      ctx.fillStyle = grad;
      ctx.fill();

      ctx.shadowBlur = 0;
      ctx.strokeStyle = isHovered ? 'white' : 'rgba(255,255,255,0.25)';
      ctx.lineWidth = (isHovered ? 2 : 1) * zoom;
      ctx.stroke();
    }
  }

  ctx.restore();

  // Label
  if (zoom > 0.35) {
    const lines = node.label.split('\n');
    const subLines = node.sub ? node.sub.split('\n') : [];
    const fs = Math.max(7, Math.min(14, node.r * zoom * 0.28));
    const subFs = Math.max(6, Math.min(11, node.r * zoom * 0.2));

    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = node.textColor || '#fff';

    const totalLines = lines.length + (zoom > 0.6 && subLines.length > 0 ? subLines.length + 0.5 : 0);
    const lineH = fs * 1.3;
    const startY = s.y - ((totalLines - 1) / 2) * lineH;

    ctx.font = `600 ${fs}px 'Caveat', cursive`;
    lines.forEach((line, i) => {
      ctx.fillText(line, s.x, startY + i * lineH);
    });

    if (zoom > 0.6 && subLines.length > 0) {
      ctx.font = `400 ${subFs}px 'DM Sans', sans-serif`;
      ctx.fillStyle = node.type === 'centre' ? 'rgba(26,26,46,0.75)' :
                      node.type === 'hmw' ? node.textColor :
                      'rgba(255,255,255,0.65)';
      const subStart = startY + lines.length * lineH + lineH * 0.3;
      subLines.forEach((line, i) => {
        ctx.fillText(line, s.x, subStart + i * lineH * 0.9);
      });
    }
  }
}

function lighten(hex, amt) {
  if (hex.startsWith('rgba') || hex.startsWith('rgb')) return hex;
  const r = Math.min(255, parseInt(hex.slice(1,3),16) + amt);
  const g = Math.min(255, parseInt(hex.slice(3,5),16) + amt);
  const b = Math.min(255, parseInt(hex.slice(5,7),16) + amt);
  return `rgb(${r},${g},${b})`;
}

let t = 0;
function draw() {
  t++;
  ctx.clearRect(0, 0, W, H);

  // Background gradient
  const bg = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, Math.max(W,H));
  bg.addColorStop(0, '#1f1f35');
  bg.addColorStop(1, '#0d0d1a');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  // Draw edges first
  edges.forEach(e => drawEdge(e));

  // Draw nodes
  // Sort: leaves behind, stakeholders in front, centre on top
  const order = ['anike-leaf','chq-leaf','hmw','anike','chq','converge','centre'];
  const sorted = [...nodes].sort((a,b) => order.indexOf(a.type) - order.indexOf(b.type));
  sorted.forEach(n => drawNode(n, t));

  requestAnimationFrame(draw);
}

// ── INTERACTION ──
function getNodeAt(sx, sy) {
  for (const node of nodes) {
    const s = worldToScreen(node.x, node.y);
    const r = node.r * zoom;
    const dx = sx - s.x, dy = sy - s.y;
    if (dx*dx + dy*dy < r*r) return node.id;
  }
  return null;
}

canvas.addEventListener('mousedown', e => {
  dragging = true;
  lastMouse = { x: e.clientX, y: e.clientY };
  document.body.classList.add('dragging');
});

canvas.addEventListener('mousemove', e => {
  if (dragging) {
    pan.x += e.clientX - lastMouse.x;
    pan.y += e.clientY - lastMouse.y;
    lastMouse = { x: e.clientX, y: e.clientY };
  }
  hoveredNode = getNodeAt(e.clientX, e.clientY);
  canvas.style.cursor = hoveredNode ? 'pointer' : (dragging ? 'grabbing' : 'grab');
});

canvas.addEventListener('mouseup', () => {
  dragging = false;
  document.body.classList.remove('dragging');
});

canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const factor = e.deltaY < 0 ? 1.1 : 0.91;
  const wx = e.clientX, wy = e.clientY;
  pan.x = wx - (wx - pan.x) * factor;
  pan.y = wy - (wy - pan.y) * factor;
  zoom = Math.max(0.2, Math.min(3, zoom * factor));
}, { passive: false });

// Touch
let lastTouchDist = null;
canvas.addEventListener('touchstart', e => {
  if (e.touches.length === 1) {
    dragging = true;
    lastMouse = { x: e.touches[0].clientX, y: e.touches[0].clientY };
  }
});
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (e.touches.length === 1 && dragging) {
    pan.x += e.touches[0].clientX - lastMouse.x;
    pan.y += e.touches[0].clientY - lastMouse.y;
    lastMouse = { x: e.touches[0].clientX, y: e.touches[0].clientY };
  } else if (e.touches.length === 2) {
    const d = Math.hypot(
      e.touches[0].clientX - e.touches[1].clientX,
      e.touches[0].clientY - e.touches[1].clientY
    );
    if (lastTouchDist) {
      const f = d / lastTouchDist;
      zoom = Math.max(0.2, Math.min(3, zoom * f));
    }
    lastTouchDist = d;
  }
}, { passive: false });
canvas.addEventListener('touchend', () => { dragging = false; lastTouchDist = null; });

// Zoom buttons
document.getElementById('zin').onclick = () => { zoom = Math.min(3, zoom * 1.2); };
document.getElementById('zout').onclick = () => { zoom = Math.max(0.2, zoom * 0.83); };
document.getElementById('zreset').onclick = () => {
  zoom = 1;
  pan.x = W / 2;
  pan.y = H / 2;
};

resize();
</script>
